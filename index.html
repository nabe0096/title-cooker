        async function generateTitles() {
            const dishInput = document.getElementById('dishName').value.trim();
            const includeInput = '';
            const hookInput = document.getElementById('hookWord').value.trim();
            const targetInput = document.getElementById('targetAudience').value.trim();

            const minLength = parseInt(document.getElementById('minLength').value) || 1;
            const maxLength = parseInt(document.getElementById('maxLength').value) || 100;

            const resultsArea = document.getElementById('resultsArea');

            if (!dishInput) {
                alert("料理名は必須です！");
                document.getElementById('dishName').focus();
                return;
            }

            // デフォルト値の設定
            const hook = hookInput ? hookInput : "箸が止まらない";
            const target = targetInput ? targetInput : "疲れた日";
            const dish = dishInput;

            resultsArea.innerHTML = '';
            let totalGenerated = 0;

            // 内蔵辞書からタイトルを生成する
            const templates = await loadTemplatesFromMarkdown();
            if (!templates) return; // 読み込み失敗時は中断

            // カテゴリー生成
            for (const [key, category] of Object.entries(templates)) {
                // パターンをランダムにシャッフル（すべてのパターンを使用する）
                let shuffledPatterns = [...category.patterns].sort(() => 0.5 - Math.random());

                // 全パターンを検証
                let validTitles = [];

                shuffledPatterns.forEach(pattern => {
                    // 置換
                    let resultTitle = pattern
                        .replace(/{dish}/g, dish)
                        .replace(/{hook}/g, hook)
                        .replace(/{target}/g, target);

                    // 不自然な表現を修正（例: 包丁いらず最高のおかず -> 包丁いらずで最高のおかず）
                    resultTitle = resultTitle.replace(/無しの作り方/g, "無しの");

                    // もし生成されたタイトルが料理名（例：肉じゃが）でぴったり終わる場合、「の作り方」を補って自然にする
                    if (resultTitle.endsWith(dish)) {
                        resultTitle += "の作り方";
                    }

                    // 付属キーワードがある場合、より自然な日本語になるようランダムなパターンで結合する
                    if (includeInput) {
                        const insertPatterns = [
                            `【${includeInput}】${resultTitle}`,                   // 先頭にカッコでいれる
                            `${resultTitle}（${includeInput}入り）`,               // 末尾にカッコ入れる
                            `${resultTitle}。${includeInput}が決め手！`,           // 末尾に一言添える
                            `${includeInput}を使って！${resultTitle}`,             // 先頭にアクションとして入れる
                            `${resultTitle}〜${includeInput}アレンジ〜`             // アレンジ感を示す
                        ];
                        // ランダムに1つ選ぶ
                        resultTitle = insertPatterns[Math.floor(Math.random() * insertPatterns.length)];
                    }

                    const charCount = resultTitle.length;

                    // 文字数制限チェック
                    // 「30文字以上」と指定されていても、25文字以上の優秀なタイトルは合格とする（厳しすぎると数が出なくなるため）
                    const effectiveMinLength = Math.max(1, minLength - 5);

                    if (charCount >= effectiveMinLength && charCount <= maxLength) {
                        validTitles.push({ text: resultTitle, count: charCount });
                    }
                });

                // 優先順位付け：指定された文字数（例：30文字）に近いものを優先的に上位に持ってくる
                validTitles.sort((a, b) => {
                    // 理想的な長さ（minLength）からの距離を計算（近いほどスコアが良い）
                    const distA = Math.abs(a.count - minLength);
                    const distB = Math.abs(b.count - minLength);
                    return distA - distB;
                });

                // 条件に合うタイトルが1つでもあればブロックを描画
                if (validTitles.length > 0) {
                    // 表示するのは最大10件までに拡張
                    const displayTitles = validTitles.slice(0, 10);
                    // 見た目をランダムに戻す（短い順に並んでしまうのを防ぐため）
                    displayTitles.sort(() => 0.5 - Math.random());

                    totalGenerated += displayTitles.length;

                    const block = document.createElement('div');
                    block.className = 'category-block';

                    const titleHtml = `
                    <div class="category-title">
                        <span>${category.icon} ${category.name}</span>
                        <span class="result-count">${displayTitles.length}件生成</span>
                    </div>
                    <div style="font-size:0.85em; color:#aaa; margin-bottom:12px;">${category.desc}</div>
                `;
                    block.innerHTML = titleHtml;

                    displayTitles.forEach(titleObj => {
                        const item = document.createElement('div');
                        item.className = 'title-item';

                        // 文字数によって色付け（35文字以上はWarning色）
                        const countClass = titleObj.count > 35 ? 'char-count warning' : 'char-count';

                        item.innerHTML = `
                        <div class="title-content">
                            <div class="title-text">${titleObj.text}</div>
                            <div class="title-meta">
                                <span class="${countClass}">${titleObj.count}文字</span>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="preview-btn" onclick="openPreview('${titleObj.text.replace(/'/g, "\\'")}')">📱 プレビュー</button>
                            <button class="copy-btn" onclick="copyText(this)">コピー</button>
                        </div>
                    `;
                        block.appendChild(item);
                    });

                    resultsArea.appendChild(block);
                }
            }

            // 1件も生成されなかった場合
            if (totalGenerated === 0) {
                resultsArea.innerHTML = `
                <div class="no-results">
                    <h3>指定した文字数（${minLength}〜${maxLength}文字）の範囲に収まるタイトルが生成できませんでした。</h3>
                    <p>文字数制限を広げるか、短めのキーワードを入力して再度お試しください。</p>
                </div>
            `;
            } else {
                // ハッシュタグ共通エリアの生成
                const allTags = [
                    '#絶品レシピ', '#男飯', '#最強メシ', '#バズレシピ', '#ガッツリ飯', '#ご飯泥棒',
                    '#裏技レシピ', '#料理の裏技', '#簡単レシピ', '#意外な組み合わせ', '#魔法のレシピ',
                    '#ズボラ飯', '#時短レシピ', '#簡単おつまみ', '#10分レシピ', '#レンチンレシピ', '#節約レシピ',
                    '#おうちごはん', '#子供が喜ぶごはん', '#記念日ディナー', '#おうち居酒屋', '#褒められレシピ'
                ];

                // ランダムに5つ抽出
                const shuffledTags = [...allTags].sort(() => 0.5 - Math.random());
                const selectedTags = shuffledTags.slice(0, 5).join(' ');

                // 料理名をハッシュタグ化して先頭に
                const dishHashtag = '#' + dish.replace(/の/g, '').replace(/と/g, '');
                const finalHashtags = `${dishHashtag} ${selectedTags}`;

                const hashtagBlock = document.createElement('div');
                hashtagBlock.className = 'category-block';
                hashtagBlock.style.marginTop = '30px';
                hashtagBlock.style.borderTop = '2px solid #333';

                hashtagBlock.innerHTML = `
                    <div class="category-title" style="color: #2979FF;">
                        <span>#️⃣ 関連ハッシュタグ</span>
                        <span style="font-size: 0.6em; background: rgba(41, 121, 255, 0.2); color: #2979FF; padding: 2px 8px; border-radius: 10px; margin-left: 10px;">概要欄用に！</span>
                    </div>
                    <div style="font-size:0.85em; color:#aaa; margin-bottom:12px;">すべての動画（ショート・横長）の概要欄にコピペして使えます。</div>
                    <div class="title-item">
                        <div class="title-content">
                            <div class="title-text" style="color:#2979FF; font-weight:bold;">${finalHashtags}</div>
                        </div>
                        <button class="copy-btn" onclick="copyText(this)">コピー</button>
                    </div>
                `;
                resultsArea.appendChild(hashtagBlock);
            }

            resultsArea.style.display = 'block';
        }

        // パレットから単語を挿入
        function insertWord(inputId, word) {
            const input = document.getElementById(inputId);
            input.value = word;
            input.focus();
        }

        // モバイルプレビュー
        function openPreview(title) {
            document.getElementById('mockTitle').innerText = title;
            document.getElementById('previewOverlay').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewOverlay').style.display = 'none';
        }

        function copyText(btnElement) {
            // コピー対象のテキストを取得
            const textToCopy = btnElement.previousElementSibling.querySelector('.title-text').innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = 'コピー済!';
                btnElement.classList.add('copied');

                showToast();

                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('コピーに失敗しました', err);
                prompt('以下のテキストをコピーしてください:', textToCopy);
            });
        }

        let toastTimeout;
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
